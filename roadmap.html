        .track-tabs {

            gap: 6px;
            margin-bottom: 24px;
        }
        .tab-btn {
            background-color: #f3f4f6;
            border: none;
            padding: 12px 2px;
            border-radius: 14px;
            font-size: 11.5px;
            font-weight: 700;
            color: #4b5563;
            transition: all 0.2s ease;
        }
        .tab-btn.active { color: #ffffff; }
        .tab-btn.active.sw-theme { background-color: #3b82f6; }
        .tab-btn.active.infra-theme { background-color: #8b5cf6; }
        .tab-btn.active.data-theme { background-color: #10b981; }
        .tab-btn.active.hw-theme { background-color: #f59e0b; }

            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .job-header {
            width: 100%;
            padding: 18px 20px;
            background: #ffffff;
            border: none;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .job-header:hover {
            background-color: #f9fafb;
        }
        .arrow-icon {
            font-size: 12px;
            color: #9ca3af;
            transition: transform 0.2s ease;
        }

        .job-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0, 1, 0, 1);
            background-color: #ffffff;
            padding: 0 20px;
        }
        .job-content.open {
            max-height: 2000px;
            padding: 4px 20px 24px 20px;
            border-top: 1px solid #f3f4f6;
        }

        .sub-label {
            font-size: 11px;
            font-weight: 800;
            color: #9ca3af;
            letter-spacing: 0.8px;
            margin: 16px 0 6px 0;
            text-transform: uppercase;
        }

            color: var(--track-color);
            background-color: var(--track-bg);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 600;
        }

            background-color: #f9fafb;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            color: #374151;
            line-height: 1.6;

            display: inline-block;
            width: 45px;

            padding: 10px 14px;
            font-size: 13px;
            color: #78350f;
            border-left: 3px solid #f59e0b;

            color: #ffffff;
            border-radius: 18px;
            padding: 16px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            margin-top: 32px;

            companies: "KT, SKT, 에릭슨엘지, 한화시스템 등 글로벌 통신 장비 제조 소프트웨어팀",
            subs: ["프로그래밍기초(1·2), 공업수학, 이산수학, IoT기초/실습, 회로이론(1)", "객체지향프로그래밍, 데이터구조, 리눅스프로그래밍, 신호및시스템, 전자회로(1)", "데이터통신, 정보보안, 인공지능수학, 임베디드시스템, 운영체제, 컴퓨터네트워크", "캡스톤디자인, 실무알고리즘 소켓 프로토콜 펌웨어 정밀 가동"],
            cert: "정보처리기사, 리눅스마스터, 정보통신기사, 무선설비기사"
        },
        {
            group: "hw",
            name: "📡 무선 및 신호처리 (통신 보고서 트랙)",
            concept: "무선 공간 속 전파 주파수의 왜곡을 연산 보정하고, 모뎀 칩셋 내부의 변복조 디지털 신호 가공(DSP) 알고리즘을 매트랩 기반 수식으로 연구 설계하는 직무이다.",
            tech: "MATLAB, Python, Keysight ADS, LabVIEW 디지털 가공 엔진, 신호처리 프레임워크",
            companies: "한화시스템 국방 방산 레이더 연구소, 한국방송통신전파진흥원(KCA)",
            subs: ["프로그래밍기초(1·2), 공업수학, 이산수학, 회로이론(1)", "객체지향프로그래밍, 데이터구조, 신호및시스템, 전자기학, 전자회로(1)", "전자회로(2), 데이터통신, 인공지능수학, 마이크로프로세서, 아날로그통신공학", "캡스톤디자인(1·2), 실무알고리즘 물리 수식 시뮬레이션"],
            cert: "무선설비기사, 전파전자통신기사, 정보통신기사 핵심 우대"
        }
    ];

    function toggleJob(headerEl) {
        const item = headerEl.parentElement;
        const content = item.querySelector('.job-content');
        const arrow = item.querySelector('.arrow-icon');

        if (content.classList.contains('open')) {
            content.classList.remove('open');
            arrow.style.transform = 'rotate(0deg)';
        } else {
            document.querySelectorAll('.job-content').forEach(el => el.classList.remove('open'));
            document.querySelectorAll('.arrow-icon').forEach(el => el.style.transform = 'rotate(0deg)');

            content.classList.add('open');
            arrow.style.transform = 'rotate(180deg)';
        }
    }

    function renderTrack(groupKey, btnEl) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => b.className = 'tab-btn');

        btnEl.classList.add('active');
        if (groupKey === 'sw') { btnEl.classList.add('sw-theme'); document.documentElement.style.setProperty('--track-color', '#3b82f6'); document.documentElement.style.setProperty('--track-bg', '#eff6ff'); }
        else if (groupKey === 'infra') { btnEl.classList.add('infra-theme'); document.documentElement.style.setProperty('--track-color', '#8b5cf6'); document.documentElement.style.setProperty('--track-bg', '#faf5ff'); }
        else if (groupKey === 'data') { btnEl.classList.add('data-theme'); document.documentElement.style.setProperty('--track-color', '#10b981'); document.documentElement.style.setProperty('--track-bg', '#f0fdf4'); }
        else if (groupKey === 'hw') { btnEl.classList.add('hw-theme'); document.documentElement.style.setProperty('--track-color', '#f59e0b'); document.documentElement.style.setProperty('--track-bg', '#fffbeb'); }

        const container = document.getElementById('roadmapAccordion');
        container.innerHTML = '';

        const targets = fullRoadmapData.filter(item => item.group === groupKey);
        targets.forEach(job => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'job-accordion-item';

            let companyLayout = '';
            if (job.companies && job.companies.trim() !== '') {
                companyLayout = `
          <div class="sub-label" style="color: #d97706">🏢 실제 진출 주요 기업</div>
          <div class="company-box">${job.companies}</div>
        `;
            }

            itemDiv.innerHTML = `
        <button class="job-header" onclick="toggleJob(this)">
          <span>${job.name}</span>
          <span class="arrow-icon">▼</span>
        </button>
        <div class="job-content">
          <div class="job-card-concept">${job.concept}</div>

          <div class="sub-label">💻 핵심 스택 / 기술</div>
          <div class="tech-box">${job.tech}</div>

          ${companyLayout}

          <div class="sub-label">🎓 학과 추천 학년별 커리큘럼</div>
          <div class="curriculum-board">
            <div><strong>1학년</strong>| &nbsp;${job.subs[0] || '-'}</div>
            <div><strong>2학년</strong>| &nbsp;${job.subs[1] || '-'}</div>
            <div><strong>3학년</strong>| &nbsp;${job.subs[2] || '-'}</div>
            <div><strong>4학년</strong>| &nbsp;${job.subs[3] || '-'}</div>
          </div>

          <div class="sub-label">🏅 권장 자격증 및 추천 활동</div>
          <p class="cert-tag">${job.cert}</p>
        </div>
      `;
            container.appendChild(itemDiv);
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        renderTrack('sw', document.querySelector('.tab-btn'));
    });
</script>
</body>
</html>
